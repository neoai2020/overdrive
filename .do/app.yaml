name: overdrive
region: nyc

# Apex + www both point at the same service.
domains:
  - domain: overdrive.ad
    type: PRIMARY
    zone: overdrive.ad
  - domain: www.overdrive.ad
    type: ALIAS
    zone: overdrive.ad

# Next.js 16 App Router app — runs as a Node web service.
# / serves the static landing via a beforeFiles rewrite in next.config.ts.
#
# We use a Dockerfile (not the Node buildpack) because the buildpack
# kept fighting us on Node version + lockfile semantics. The Dockerfile
# pins Node 22 LTS, owns the install step, and ships a minimal runner.
services:
  - name: overdrive-web
    github:
      repo: neoai2020/overdrive
      branch: main
      deploy_on_push: true
    source_dir: /
    dockerfile_path: Dockerfile
    instance_size_slug: basic-xs
    instance_count: 1
    http_port: 8080

    health_check:
      http_path: /
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 5

    envs:
      # Public Supabase config — baked into the client bundle at build time,
      # so it MUST be BUILD_TIME scope.
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: BUILD_TIME
        value: https://axzjiwbjmgytuacmknpy.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4emppd2JqbWd5dHVhY21rbnB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwNDA3MjEsImV4cCI6MjA4NDYxNjcyMX0.mrWlbN9ed35zVU692qrNAVp3U-5xri3LTbz7ZpEvQWU

      # Public site URL — used for OAuth redirects + email links.
      # Point this at the live host once the domain is wired up.
      - key: NEXT_PUBLIC_SITE_URL
        scope: BUILD_TIME
        value: https://overdrive.ad

      # SECRETS — set these in the DO dashboard AFTER the first deploy:
      #   Apps → overdrive → Settings → App-Level Environment Variables → Edit
      #
      #   SUPABASE_SERVICE_ROLE_KEY   (encrypted, RUN_AND_BUILD_TIME)
      #     Required server-side for admin operations (the seed script,
      #     any future code that bypasses RLS). Get it from:
      #     Supabase dashboard → Settings → API → service_role secret.
      #
      # We deliberately do NOT declare it here. If we declared it with a
      # placeholder value, every redeploy would overwrite whatever you set
      # in the dashboard.
